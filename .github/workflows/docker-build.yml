name: Docker Build

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t unet3d-medseg-api:test .
      - name: Build Streamlit image
        run: docker build -f docker/Dockerfile.streamlit -t unet3d-medseg-streamlit:test .
