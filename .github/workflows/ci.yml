name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - "requirements/**"
      - "requirements.txt"
      - "model.yaml"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - "requirements/**"
      - "requirements.txt"
      - "model.yaml"
      - ".github/workflows/ci.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
      - name: Environment contract
        run: python scripts/check_environment.py
      - name: Run tests
        run: python scripts/run_tests.py tests/data tests/mlops tests/api
