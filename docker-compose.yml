services:
  api:
    profiles: ["api", "all"]
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: unet3d-medseg-api:latest
    environment:
      UNET3D_DEVICE: ${UNET3D_DEVICE:-auto}
      UNET3D_MODEL_PATH: ${UNET3D_MODEL_PATH:-/models/champion/model.pt}
      UNET3D_ARTIFACT_ROOT: /artifacts
      UNET3D_PREDICTION_LOG_PATH: /artifacts/predictions/prediction_log.jsonl
      UNET3D_MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts/models:/models:ro
      - ./artifacts:/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  streamlit:
    profiles: ["app", "all"]
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    image: unet3d-medseg-streamlit:latest
    environment:
      UNET3D_API_URL: http://api:8000
      UNET3D_MODEL_PATH: ${UNET3D_MODEL_PATH:-/models/unet3d_best.pt}
    ports:
      - "8501:8501"
    volumes:
      - ./artifacts:/models:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  mlflow:
    profiles: ["mlflow", "all"]
    image: python:3.11-slim
    working_dir: /workspace
    command: >
      sh -c "pip install --no-cache-dir 'mlflow>=2.12,<3.0' &&
      mlflow server
      --backend-store-uri sqlite:////workspace/artifacts/mlflow/mlflow.db
      --default-artifact-root /workspace/artifacts/mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./artifacts/mlflow:/workspace/artifacts/mlflow

  prometheus:
    profiles: ["monitoring", "all"]
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    profiles: ["monitoring", "all"]
    image: grafana/grafana:10.4.3
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  airflow-postgres:
    profiles: ["airflow", "all"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data

  airflow-init:
    profiles: ["airflow", "all"]
    image: apache/airflow:2.9.3
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/include:/opt/airflow/include
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/workspace
    command: version

  airflow-webserver:
    profiles: ["airflow", "all"]
    image: apache/airflow:2.9.3
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      PYTHONPATH: /workspace
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/include:/opt/airflow/include
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/workspace
    command: webserver

  airflow-scheduler:
    profiles: ["airflow", "all"]
    image: apache/airflow:2.9.3
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      PYTHONPATH: /workspace
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/include:/opt/airflow/include
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/workspace
    command: scheduler

volumes:
  airflow-postgres-data:
